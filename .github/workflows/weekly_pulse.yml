name: Weekly Review Pulse

on:
  schedule:
    # Run at 9:00 AM UTC every Monday
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID (e.g. com.nextbillion.groww)'
        required: false
        default: 'com.nextbillion.groww'
      weeks:
        description: 'Number of weeks back to scrape'
        required: false
        default: '12'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pipeline Master Switch
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          GROQ_TEMPERATURE: 0
          REVIEW_WINDOW_WEEKS: ${{ github.event.inputs.weeks || 12 }}
          MAX_THEMES: 5
          PULSE_TOP_THEMES: 3
          PULSE_MAX_WORDS: 250
          PULSE_EMAIL_TO: ${{ secrets.PULSE_EMAIL_TO }}
          PULSE_DOC_TITLE: "Weekly Review Pulse"
          PULSE_DOC_ID: ${{ secrets.PULSE_DOC_ID }}
          TARGET_PLAY_STORE_PACKAGE: "com.nextbillion.groww"
          APP_COUNTRY: "in"
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
        run: |
          python run_pulse.py
          
      - name: Save to History Folder
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p data/history/$DATE
          cp data/exports/pulse.json data/history/$DATE/pulse.json
          cp data/exports/weekly_pulse.md data/history/$DATE/weekly_pulse.md
          
      - name: Commit and Push History
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Save automated Pulse Report history for $DATE"
          file_pattern: data/history/*
          
      - name: Upload Weekly Pulse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-report
          path: data/exports/weekly_pulse.md
